<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div class="container-fluid main-content">
        <div class="row w-100 justify-content-center align-items-center">
            <div class="col-12 col-md-6 col-lg-6 left-section">
                <div class="nrs-logo-container">
                    <img th:src="@{/images/NRS_brand.png}" height="100" width="150" />
                    <div class="nrs-logo-text">NRS</div>
                    <div class="nrs-logo-subtext">SOLAR SOLUTION</div>
                </div>
                <p>"SUCCESS IS A GAME AND WE HAVE TO PLAY THE ROLE"</p>
            </div>

            <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="right-section w-100 p-4">
                    <h2>Reset Password</h2>

                    <form id="resetPasswordForm">
                        <input type="hidden" id="resetToken" th:value="${token}">
                        
                        <div class="mb-3 mt-4">
                            <label for="newPasswordInput" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="newPasswordInput" required placeholder="Enter your new password">
                        </div>
                        <div class="mb-4">
                            <label for="confirmPasswordInput" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPasswordInput" required placeholder="Confirm your new password">
                        </div>
                        
                        <div id="resetPasswordMessage" class="mt-2 mb-3" style="display: none;"></div>
                        
                        <button type="submit" class="btn btn-primary w-100">Update Password</button>
                        
                        <div class="text-center mt-3">
                            <a th:href="@{/login}" class="text-decoration-none">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Include Common Loader and Toaster -->
    <div th:replace="~{fragments/commonUI :: loader}"></div>
    <div th:replace="~{fragments/commonUI :: toaster}"></div>

    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
    
    <script>
        $(document).ready(function() {
            $("#resetPasswordForm").submit(function(event) {
                event.preventDefault();
                
                var token = $("#resetToken").val();
                var newPassword = $("#newPasswordInput").val();
                var confirmPassword = $("#confirmPasswordInput").val();
                var $messageBox = $("#resetPasswordMessage");
                
                $messageBox.hide().removeClass("alert-success alert-danger");
                
                if (newPassword !== confirmPassword) {
                    $messageBox.text("Passwords do not match.").addClass("alert alert-danger").show();
                    return;
                }
                
                if (newPassword.length < 6) {
                    $messageBox.text("Password must be at least 6 characters long.").addClass("alert alert-danger").show();
                    return;
                }
                
                showLoader();

                $.ajax({
                    url: "/NRS/reset-password",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({ token: token, newPassword: newPassword }),
                    success: function(response) {
                        hideLoader();
                        $messageBox.text("Password successfully updated. Redirecting to login...").addClass("alert alert-success").show();
                        setTimeout(function() {
                            window.location.href = "/NRS/login";
                        }, 2000);
                    },
                    error: function(xhr) {
                        hideLoader();
                        var errorMsg = xhr.responseText || "An error occurred. The link might be invalid or expired.";
                        $messageBox.text(errorMsg).addClass("alert alert-danger").show();
                    }
                });
            });
        });
    </script>
</body>

</html>
