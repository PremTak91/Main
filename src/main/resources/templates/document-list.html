<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Management | NRS Solar Solution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebarMenu}"></div>

        <div class="d-flex flex-column w-100">
            <div th:replace="~{fragments/header :: headerPart}"></div>

            <main class="main-content-area flex-grow-1 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                    <h3 class="mb-0 text-primary fw-bold"><i class="fas fa-file-alt me-2"></i>Document Management</h3>
                    <button class="btn btn-primary" onclick="openAddDocumentModal()">
                        <i class="fas fa-plus"></i> Upload Document
                    </button>
                </div>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Search Form -->
                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/admin/documents}" method="get" class="row g-3">
                            <div class="col-md-8">
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" name="keyword" class="form-control" placeholder="Search documents by name..." th:value="${keyword}">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-primary w-100">Search</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Documents Table -->
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>
                                            <a th:href="@{'/admin/documents?page=' + ${currentPage} + '&sortBy=name&sortDir=' + ${reverseSortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}" class="text-decoration-none text-dark">
                                                Document Name <i class="fas" th:classappend="${sortBy == 'name' ? (sortDir == 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort text-muted'}"></i>
                                            </a>
                                        </th>
                                        <th>
                                            <a th:href="@{'/admin/documents?page=' + ${currentPage} + '&sortBy=createdAt&sortDir=' + ${reverseSortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}" class="text-decoration-none text-dark">
                                                Upload Date <i class="fas" th:classappend="${sortBy == 'createdAt' ? (sortDir == 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort text-muted'}"></i>
                                            </a>
                                        </th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="doc : ${documents.content}">
                                        <td>
                                            <i class="fas fa-file-alt text-primary me-2"></i>
                                            <span class="fw-medium" th:text="${doc.name}"></span>
                                        </td>
                                        <td th:text="${doc.createdAt != null ? #temporals.format(doc.createdAt, 'dd MMM yyyy, HH:mm') : '-'}"></td>
                                        <td class="text-end">
                                            <button th:data-url="${doc.documentUrl}" th:data-name="${doc.name}" onclick="downloadDocument(this.getAttribute('data-url'), this.getAttribute('data-name'))" class="btn btn-sm btn-outline-primary" title="Download">
                                                <i class="fas fa-download"></i>
                                            </button>
                                            <button th:onclick="'deleteDocument(' + ${doc.id} + ')'" class="btn btn-sm btn-outline-danger ms-1" title="Delete">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                    <tr th:if="${documents.empty}">
                                        <td colspan="3" class="text-center py-4 text-muted">
                                            <i class="fas fa-folder-open fs-2 mb-2 d-block"></i>
                                            No documents found.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- Pagination -->
                        <nav th:if="${totalPages > 0}" aria-label="Page navigation" class="mt-4">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{'/admin/documents?page=' + ${currentPage - 1} + '&sortBy=' + ${sortBy} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}">Previous</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i ? 'active' : ''}">
                                    <a class="page-link" th:href="@{'/admin/documents?page=' + ${i} + '&sortBy=' + ${sortBy} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}" th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{'/admin/documents?page=' + ${currentPage + 1} + '&sortBy=' + ${sortBy} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Document Modal -->
    <div class="modal fade" id="documentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="documentForm" th:action="@{/admin/documents/upload}" method="post" enctype="multipart/form-data" onsubmit="showLoader()">
                    <div class="modal-header">
                        <h5 class="modal-title">Upload New Document</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="docName" class="form-label">Document Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="docName" name="name" required placeholder="e.g., Company Policy 2026">
                        </div>
                        <div class="mb-3">
                            <label for="docFile" class="form-label">Select File <span class="text-danger">*</span></label>
                            <input type="file" class="form-control" id="docFile" name="file" accept=".pdf,.doc,.docx,.xls,.xlsx" required>
                            <div class="form-text">Supported formats: PDF, Word (.doc, .docx), and Excel (.xls, .xlsx)</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Shared UI Components -->
    <div th:replace="~{fragments/commonUI :: loader}"></div>
    <div th:replace="~{fragments/commonUI :: toaster}"></div>
    <div th:replace="~{fragments/commonUI :: confirmModal}"></div>
    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>

    <script th:src="@{/js/documentManagement.js}"></script>
</body>
</html>
