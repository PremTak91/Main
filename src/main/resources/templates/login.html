<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{css/styles.css}">
</head>

<body>

    <div class="container-fluid main-content">
        <div class="row w-100 justify-content-center align-items-center">
            <div class="col-12 col-md-6 col-lg-6 left-section">
                <div class="nrs-logo-container">
                    <img th:src="@{/images/NRS_brand.png}" height="100" width="150" />
                    <div class="nrs-logo-text">NRS</div>
                    <div class="nrs-logo-subtext">SOLAR SOLUTION</div>
                </div>
                <p>"SUCCESS IS A GAME AND WE HAVE TO PLAY THE ROLE"</p>
            </div>

            <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="right-section">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="emailInput" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="emailInput" aria-describedby="emailHelp"
                                placeholder="Enter your email">
                        </div>
                        <div class="mb-3">
                            <label for="passwordInput" class="form-label">Password</label>
                            <input type="password" class="form-control" id="passwordInput"
                                placeholder="Enter your password">
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Remember Password</label>
                            </div>
                            <a href="/" class="text-decoration-none">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary mb-3">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footerPart}"></div>
</body>
<div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
<script th:src="@{/js/login.js}"></script>

</html>
