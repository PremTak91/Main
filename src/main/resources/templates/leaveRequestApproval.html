<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Leave Request Approval</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div class="dashboard-wrapper">

        <div th:replace="fragments/sidebar :: sidebarMenu"> </div>

        <div class="d-flex flex-column w-100">

            <div th:replace="fragments/header :: headerPart"> </div>

            <main class="main-content-area flex-grow-1">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="mb-0">Leave Request Approval</h3>
                </div>

                <div class="card p-4">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                        <h5 class="card-title mb-2 mb-md-0">Assigned Leave Requests</h5>
                        <div class="d-flex align-items-center flex-wrap">
                            <label for="searchTable" class="form-label me-2 mb-0">Search:</label>
                            <input type="text" class="form-control form-control-sm d-inline-block" id="searchTable"
                                placeholder="" style="width: auto;">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle" id="leaveRequestTable">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">No.</th>
                                    <th scope="col">Employee Name</th>
                                    <th scope="col">Leave Description</th>
                                    <th scope="col">From Date</th>
                                    <th scope="col">To Date</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="request, iterStat : ${leaveRequests}">
                                    <td th:text="${iterStat.index + 1}">1</td>
                                    <td th:text="${request['employeeName'] ?: 'N/A'}">Employee Name</td>
                                    <td th:text="${request['description'] ?: ''}">Leave description</td>
                                    <td th:text="${request['fromDate']}">01/01/2026</td>
                                    <td th:text="${request['toDate']}">01/01/2026</td>
                                    <td>
                                        <span th:if="${request['status'] == 'Pending'}"
                                            class="badge bg-warning text-dark">Pending</span>
                                        <span th:if="${request['status'] == 'Approved'}"
                                            class="badge bg-success">Approved</span>
                                        <span th:if="${request['status'] == 'Rejected'}"
                                            class="badge bg-danger">Rejected</span>
                                    </td>
                                    <td>
                                        <div th:if="${request['status'] == 'Pending'}">
                                            <button class="btn btn-success btn-sm me-1"
                                                th:onclick="'acceptLeave(' + ${request['id']} + ')'" title="Accept">
                                                <i class="fas fa-check"></i> Accept
                                            </button>
                                            <button class="btn btn-danger btn-sm"
                                                th:onclick="'openRejectModal(' + ${request['id']} + ')'" title="Reject">
                                                <i class="fas fa-times"></i> Reject
                                            </button>
                                        </div>
                                        <span th:if="${request['status'] != 'Pending'}"
                                            th:text="${request['approvalReason'] ?: ''}"></span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(leaveRequests)}">
                                    <td colspan="7" class="text-center">No leave requests found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <div th:replace="fragments/footer :: footerPart"> </div>

        </div>
    </div>

    <!-- Reject Reason Modal -->
    <div class="modal fade" id="rejectModal" tabindex="-1" aria-labelledby="rejectModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="rejectModalLabel">Reject Leave Request</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="rejectLeaveId">
                    <div class="mb-3">
                        <label for="rejectReason" class="form-label">Reason for Rejection <span
                                class="text-danger">*</span></label>
                        <textarea class="form-control" id="rejectReason" rows="3" required
                            placeholder="Please enter the reason for rejection"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmReject()">
                        <i class="fas fa-times me-1"></i> Reject Leave
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/commonUI :: loader"></div>
    <div th:replace="fragments/commonUI :: toaster"></div>

    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
    <script th:src="@{/js/leaveRequestApproval.js}"></script>
</body>

</html>
