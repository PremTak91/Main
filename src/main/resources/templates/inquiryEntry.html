<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Inquiry Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="dashboard-wrapper">

        <div th:replace="fragments/sidebar :: sidebarMenu"> </div>

        <div class="d-flex flex-column w-100">

            <div th:replace="fragments/header :: headerPart"> </div>

            <main class="main-content-area flex-grow-1">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="mb-0">Inquiry Entry List</h3>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addInquiryModal">
                        <i class="fas fa-plus me-2"></i> Add Entry
                    </button>
                </div>

                <div class="card p-4 mb-4">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                        <div class="d-flex align-items-center mb-2 mb-md-0">
                            <label for="showEntries" class="form-label me-2 mb-0">Show</label>
                            <select class="form-select form-select-sm" id="showEntries" style="width: auto;"
                                onchange="changePageSize(this.value)">
                                <option value="10" th:selected="${pageSize == 10}">10</option>
                                <option value="25" th:selected="${pageSize == 25}">25</option>
                                <option value="50" th:selected="${pageSize == 50}">50</option>
                                <option value="100" th:selected="${pageSize == 100}">100</option>
                            </select>
                            <span class="ms-2">entries</span>
                        </div>
                        <div class="ms-md-auto">
                            <label for="searchTable" class="form-label me-2 mb-0">Search:</label>
                            <input type="text" class="form-control form-control-sm d-inline-block" id="searchTable"
                                placeholder="" style="width: auto;">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle" id="inquiryTable">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">
                                        <a th:href="@{/inquiry(page=${currentPage}, size=${pageSize}, sortBy='id', sortDir=${sortBy == 'id' ? reverseSortDir : 'asc'})}"
                                            class="text-decoration-none text-dark">
                                            No. <i
                                                th:classappend="${sortBy == 'id'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/inquiry(page=${currentPage}, size=${pageSize}, sortBy='name', sortDir=${sortBy == 'name' ? reverseSortDir : 'asc'})}"
                                            class="text-decoration-none text-dark">
                                            Name <i
                                                th:classappend="${sortBy == 'name'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/inquiry(page=${currentPage}, size=${pageSize}, sortBy='contactNo', sortDir=${sortBy == 'contactNo' ? reverseSortDir : 'asc'})}"
                                            class="text-decoration-none text-dark">
                                            Contact no. <i
                                                th:classappend="${sortBy == 'contactNo'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/inquiry(page=${currentPage}, size=${pageSize}, sortBy='address', sortDir=${sortBy == 'address' ? reverseSortDir : 'asc'})}"
                                            class="text-decoration-none text-dark">
                                            Address <i
                                                th:classappend="${sortBy == 'address'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/inquiry(page=${currentPage}, size=${pageSize}, sortBy='givenByName', sortDir=${sortBy == 'givenByName' ? reverseSortDir : 'asc'})}"
                                            class="text-decoration-none text-dark">
                                            Given By <i
                                                th:classappend="${sortBy == 'givenByName'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">Inquiry History</th>
                                    <th scope="col">
                                        <a th:href="@{/inquiry(page=${currentPage}, size=${pageSize}, sortBy='inquiryDate', sortDir=${sortBy == 'inquiryDate' ? reverseSortDir : 'asc'})}"
                                            class="text-decoration-none text-dark">
                                            Date <i
                                                th:classappend="${sortBy == 'inquiryDate'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/inquiry(page=${currentPage}, size=${pageSize}, sortBy='status', sortDir=${sortBy == 'status' ? reverseSortDir : 'asc'})}"
                                            class="text-decoration-none text-dark">
                                            Status <i
                                                th:classappend="${sortBy == 'status'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="inquiry, iterStat : ${inquiries}">
                                    <td th:text="${(currentPage * pageSize) + iterStat.index + 1}">1</td>
                                    <td th:text="${inquiry.name != null ? inquiry.name : '-'}">Name</td>
                                    <td th:text="${inquiry.contactNo != null ? inquiry.contactNo : '-'}">Contact</td>
                                    <td th:text="${inquiry.address != null ? inquiry.address : '-'}">Address</td>
                                    <td th:text="${inquiry.givenByName != null ? inquiry.givenByName : '-'}">Given By
                                    </td>
                                    <td th:text="${inquiry.inquiryHistory != null ? inquiry.inquiryHistory : '-'}">
                                        History</td>
                                    <td
                                        th:text="${inquiry.inquiryDate != null ? #temporals.format(inquiry.inquiryDate, 'dd/MM/yyyy') : '-'}">
                                        Date</td>
                                    <td>
                                        <span th:if="${inquiry.status == 'New'}" class="badge bg-info">New</span>
                                        <span th:if="${inquiry.status == 'In-progress'}"
                                            class="badge bg-primary">In-progress</span>
                                        <span th:if="${inquiry.status == 'Closed'}"
                                            class="badge bg-success">Closed</span>
                                        <span th:if="${inquiry.status == 'Pending'}"
                                            class="badge bg-warning text-dark">Pending</span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-info text-white me-1" title="Edit"
                                            th:onclick="'editInquiry(' + ${inquiry.id} + ')'"><i
                                                class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-danger" title="Delete"
                                            th:onclick="'deleteInquiry(' + ${inquiry.id} + ')'"><i
                                                class="fas fa-trash-alt"></i></button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(inquiries)}">
                                    <td colspan="9" class="text-center">No inquiries found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div>
                            Showing <span th:text="${totalItems > 0 ? (currentPage * pageSize) + 1 : 0}">0</span>
                            to <span
                                th:text="${(currentPage + 1) * pageSize > totalItems ? totalItems : (currentPage + 1) * pageSize}">0</span>
                            of <span th:text="${totalItems}">0</span> entries
                        </div>
                        <nav aria-label="Page navigation">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/inquiry(page=${currentPage - 1}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir})}">Previous</a>
                                </li>
                                <th:block th:each="i : ${#numbers.sequence(0, totalPages > 0 ? totalPages - 1 : 0)}">
                                    <li class="page-item" th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
                                        th:classappend="${i == currentPage} ? 'active'">
                                        <a class="page-link"
                                            th:href="@{/inquiry(page=${i}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir})}"
                                            th:text="${i + 1}">1</a>
                                    </li>
                                </th:block>
                                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/inquiry(page=${currentPage + 1}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>

            <div th:replace="fragments/footer :: footerPart"> </div>
        </div>
    </div>

    <div class="modal fade" id="addInquiryModal" tabindex="-1" aria-labelledby="addInquiryModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addInquiryModalLabel">Add Inquiry</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="inquiryForm">
                        <input type="hidden" id="inquiryId" value="">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="inquiryName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="inquiryName" placeholder="">
                            </div>
                            <div class="col-md-6">
                                <label for="contactNo" class="form-label">Contact no.</label>
                                <input type="tel" class="form-control" id="contactNo" placeholder="">
                            </div>
                            <div class="col-md-6">
                                <label for="inquiryAddress" class="form-label">Address</label>
                                <input type="text" class="form-control" id="inquiryAddress" placeholder="">
                            </div>
                            <div class="col-md-6">
                                <label for="inquiryDate" class="form-label">Date</label>
                                <div class="input-group">
                                    <input type="date" class="form-control" id="inquiryDate">
                                    <span class="input-group-text"><i class="far fa-calendar-alt"></i></span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="givenBy" class="form-label">Given By</label>
                                <select class="form-select" id="givenBy">
                                    <option selected disabled value="">Select</option>
                                    <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}">
                                        Employee Name</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="inquiryStatus" class="form-label">Status</label>
                                <select class="form-select" id="inquiryStatus">
                                    <option selected disabled value="">Select</option>
                                    <option value="New">New</option>
                                    <option value="In-progress">In-progress</option>
                                    <option value="Closed">Closed</option>
                                    <option value="Pending">Pending</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="inquiryHistory" class="form-label">Inquiry History</label>
                                <textarea class="form-control" id="inquiryHistory" rows="3" placeholder=""></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer justify-content-between">
                    <button type="button" class="btn btn-primary" onclick="saveInquiry()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/commonUI :: loader"></div>
    <div th:replace="fragments/commonUI :: toaster"></div>

    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
    <script th:src="@{/js/inquiry.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const currentSortBy = /*[[${sortBy}]]*/ 'id';
        const currentSortDir = /*[[${sortDir}]]*/ 'desc';
        const currentPageSize = /*[[${pageSize}]]*/ 10;
        /*]]>*/
    </script>
</body>

</html>
