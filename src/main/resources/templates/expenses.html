<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="dashboard-wrapper">

        <div th:replace="fragments/sidebar :: sidebarMenu"> </div>

        <div class="d-flex flex-column w-100">

            <div th:replace="fragments/header :: headerPart"> </div>

            <main class="main-content-area flex-grow-1">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <h3 class="mb-0">
                        Expenses List 
                        <span class="badge bg-info text-dark ms-2" style="font-size: 0.9rem;">
                            Total Amount: ₹<span th:text="${totalExpenseAmount}">0</span>
                        </span>
                    </h3>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-success" onclick="exportExpenses()">
                            <i class="fas fa-file-excel me-2"></i> Export Excel
                        </button>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                            <i class="fas fa-plus me-2"></i> Add Entry
                        </button>
                    </div>
                </div>

                <div class="card p-4 mb-4">
                    <div class="row g-2 mb-3">
                        <div class="col-md-2">
                            <label for="startDate" class="form-label form-label-sm mb-1">Start Date</label>
                            <input type="date" class="form-control form-control-sm" id="startDate" th:value="${startDate}">
                        </div>
                        <div class="col-md-2">
                            <label for="endDate" class="form-label form-label-sm mb-1">End Date</label>
                            <input type="date" class="form-control form-control-sm" id="endDate" th:value="${endDate}">
                        </div>
                        <div class="col-md-2">
                            <label for="searchType" class="form-label form-label-sm mb-1">Search By</label>
                            <select class="form-select form-select-sm" id="searchType">
                                <option value="ALL" th:selected="${searchType == 'ALL'}">All Fields</option>
                                <option value="GIVEN_BY" th:selected="${searchType == 'GIVEN_BY'}">Given By</option>
                                <option value="GIVEN_TO" th:selected="${searchType == 'GIVEN_TO'}">Given To</option>
                                <option value="TYPE" th:selected="${searchType == 'TYPE'}">Expense Type</option>
                                <option value="DESC" th:selected="${searchType == 'DESC'}">Description</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="searchTable" class="form-label form-label-sm mb-1">Keyword</label>
                            <input type="text" class="form-control form-control-sm" id="searchTable"
                                th:value="${keyword}" placeholder="Type keyword...">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button class="btn btn-sm btn-primary w-100" onclick="applyFilters()">
                                <i class="fas fa-filter me-1"></i> Filter
                            </button>
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                        <div class="d-flex align-items-center mb-2 mb-md-0">
                            <label for="showEntries" class="form-label me-2 mb-0">Show</label>
                            <select class="form-select form-select-sm" id="showEntries" style="width: auto;"
                                onchange="changePageSize(this.value)">
                                <option value="10" th:selected="${pageSize == 10}">10</option>
                                <option value="25" th:selected="${pageSize == 25}">25</option>
                                <option value="50" th:selected="${pageSize == 50}">50</option>
                                <option value="100" th:selected="${pageSize == 100}">100</option>
                            </select>
                            <span class="ms-2">entries</span>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle" id="expensesTable">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">
                                        <a th:href="@{/expenses(page=${currentPage}, size=${pageSize}, sortBy='id', sortDir=${sortBy == 'id' ? reverseSortDir : 'asc'}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            class="text-decoration-none text-dark">
                                            No. <i
                                                th:classappend="${sortBy == 'id'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/expenses(page=${currentPage}, size=${pageSize}, sortBy='description', sortDir=${sortBy == 'description' ? reverseSortDir : 'asc'}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            class="text-decoration-none text-dark">
                                            Description <i
                                                th:classappend="${sortBy == 'description'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/expenses(page=${currentPage}, size=${pageSize}, sortBy='totalAmount', sortDir=${sortBy == 'totalAmount' ? reverseSortDir : 'asc'}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            class="text-decoration-none text-dark">
                                            Amount <i
                                                th:classappend="${sortBy == 'totalAmount'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/expenses(page=${currentPage}, size=${pageSize}, sortBy='givenBy', sortDir=${sortBy == 'givenBy' ? reverseSortDir : 'asc'}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            class="text-decoration-none text-dark">
                                            Given By <i
                                                th:classappend="${sortBy == 'givenBy'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/expenses(page=${currentPage}, size=${pageSize}, sortBy='givenTo', sortDir=${sortBy == 'givenTo' ? reverseSortDir : 'asc'}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            class="text-decoration-none text-dark">
                                            Given To <i
                                                th:classappend="${sortBy == 'givenTo'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/expenses(page=${currentPage}, size=${pageSize}, sortBy='expenseDate', sortDir=${sortBy == 'expenseDate' ? reverseSortDir : 'asc'}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            class="text-decoration-none text-dark">
                                            Date <i
                                                th:classappend="${sortBy == 'expenseDate'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">
                                        <a th:href="@{/expenses(page=${currentPage}, size=${pageSize}, sortBy='expenseType', sortDir=${sortBy == 'expenseType' ? reverseSortDir : 'asc'}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            class="text-decoration-none text-dark">
                                            Expense Type <i
                                                th:classappend="${sortBy == 'expenseType'} ? (${sortDir == 'asc'} ? 'fa-sort-up text-primary' : 'fa-sort-down text-primary') : 'fa-sort text-muted'"
                                                class="fas ms-1"></i>
                                        </a>
                                    </th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="expense, iterStat : ${expenses}">
                                    <td th:text="${(currentPage * pageSize) + iterStat.index + 1}">1</td>
                                    <td th:text="${expense.description != null ? expense.description : '-'}">Description
                                    </td>
                                    <td th:text="${expense.totalAmount != null ? expense.totalAmount : '-'}">Amount</td>
                                    <td th:text="${expense.givenBy != null ? expense.givenBy : '-'}">Given By</td>
                                    <td th:text="${expense.givenTo != null ? expense.givenTo : '-'}">Given To</td>
                                    <td
                                        th:text="${expense.expenseDate != null ? #temporals.format(expense.expenseDate, 'dd/MM/yyyy') : '-'}">
                                        Date</td>
                                    <td th:text="${expense.expenseType != null ? expense.expenseType : '-'}">Type</td>
                                    <td>
                                        <button th:if="${isAdmin or (expense.createdBy == currentEmployeeId and expense.createdAt.toLocalDate().isEqual(today))}"
                                            class="btn btn-sm btn-info text-white me-1" title="Edit"
                                            th:onclick="'editExpense(' + ${expense.id} + ')'"><i
                                                class="fas fa-edit"></i></button>
                                        <button th:if="${isAdmin}"
                                            class="btn btn-sm btn-danger" title="Delete"
                                            th:onclick="'deleteExpense(' + ${expense.id} + ')'"><i
                                                class="fas fa-trash-alt"></i></button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(expenses)}">
                                    <td colspan="8" class="text-center">No expenses found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div>
                            Showing <span th:text="${totalItems > 0 ? (currentPage * pageSize) + 1 : 0}">0</span>
                            to <span
                                th:text="${(currentPage + 1) * pageSize > totalItems ? totalItems : (currentPage + 1) * pageSize}">0</span>
                            of <span th:text="${totalItems}">0</span> entries
                        </div>
                        <nav aria-label="Page navigation">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/expenses(page=${currentPage - 1}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}">Previous</a>
                                </li>
                                <th:block th:each="i : ${#numbers.sequence(0, totalPages > 0 ? totalPages - 1 : 0)}">
                                    <li class="page-item" th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
                                        th:classappend="${i == currentPage} ? 'active'">
                                        <a class="page-link"
                                            th:href="@{/expenses(page=${i}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}"
                                            th:text="${i + 1}">1</a>
                                    </li>
                                </th:block>
                                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/expenses(page=${currentPage + 1}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${keyword}, searchType=${searchType}, startDate=${startDate}, endDate=${endDate})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>

            <div th:replace="fragments/footer :: footerPart"> </div>

        </div>
    </div>

    <div class="modal fade" id="addExpenseModal" tabindex="-1" aria-labelledby="addExpenseModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addExpenseModalLabel">Add Expense</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="expenseForm">
                        <input type="hidden" id="expenseId" value="">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="paymentDescription" class="form-label">Payment Description</label>
                                <input type="text" class="form-control" id="paymentDescription" placeholder="">
                                <div class="form-text">payment description should be short</div>
                            </div>
                            <div class="col-md-6">
                                <label for="totalAmount" class="form-label">Total Amount</label>
                                <input type="number" class="form-control" id="totalAmount" placeholder="">
                            </div>
                            <div class="col-md-6">
                                <label for="advancedAmount" class="form-label">Advanced Amount</label>
                                <input type="number" class="form-control" id="advancedAmount" placeholder="">
                            </div>
                            <div class="col-md-6">
                                <label for="expenseDate" class="form-label">Date</label>
                                <div class="input-group">
                                    <input type="date" class="form-control" id="expenseDate">
                                    <span class="input-group-text"><i class="far fa-calendar-alt"></i></span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="givenBy" class="form-label">Given By</label>
                                <input type="text" class="form-control" id="givenBy" placeholder="">
                            </div>
                            <div class="col-md-6">
                                <label for="givenTo" class="form-label">Given To</label>
                                <input type="text" class="form-control" id="givenTo" placeholder="">
                            </div>
                            <div class="col-md-6">
                                <label for="expenseType" class="form-label">Expense Type</label>
                                <input type="text" class="form-control" id="expenseType" placeholder="e.g. Fixed, Unfixed, Travel">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer justify-content-between">
                    <button type="button" class="btn btn-primary" onclick="saveExpense()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/commonUI :: loader"></div>
    <div th:replace="fragments/commonUI :: toaster"></div>
    <div th:replace="fragments/commonUI :: confirmModal"></div>

    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
    <script th:src="@{/js/expenses.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const currentSortBy = /*[[${sortBy}]]*/ 'id';
        const currentSortDir = /*[[${sortDir}]]*/ 'desc';
        const currentPageSize = /*[[${pageSize}]]*/ 10;
        const currentKeyword = /*[[${keyword != null ? keyword : ''}]]*/ '';
        const currentSearchType = /*[[${searchType != null ? searchType : 'ALL'}]]*/ 'ALL';
        const currentStartDate = /*[[${startDate != null ? startDate : ''}]]*/ '';
        const currentEndDate = /*[[${endDate != null ? endDate : ''}]]*/ '';
        /*]]>*/
    </script>
</body>

</html>
