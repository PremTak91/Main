<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles & Permissions - NRS Solar Solution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div class="dashboard-wrapper">
        <div th:replace="fragments/sidebar :: sidebarMenu"></div>
        <div class="d-flex flex-column w-100">
            <div th:replace="fragments/header :: headerPart"></div>

            <main class="main-content-area flex-grow-1 p-4">
                <div class="container-fluid">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white py-3">
                            <ul class="nav nav-tabs card-header-tabs" id="rolesTabs" role="tablist">
                                <li class="nav-item">
                                    <button class="nav-link active" id="user-roles-tab" data-bs-toggle="tab"
                                        data-bs-target="#user-roles" type="button" role="tab" aria-controls="user-roles"
                                        aria-selected="true">Assign User Roles</button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link" id="system-roles-tab" data-bs-toggle="tab"
                                        data-bs-target="#system-roles" type="button" role="tab"
                                        aria-controls="system-roles" aria-selected="false">Manage System Roles</button>
                                </li>
                            </ul>
                        </div>
                        <div class="card-body">
                            <div class="tab-content" id="rolesTabsContent">
                                <!-- User Roles Tab -->
                                <div class="tab-pane fade show active" id="user-roles" role="tabpanel"
                                    aria-labelledby="user-roles-tab">
                                    <div class="d-flex justify-content-end mb-3 mt-3">
                                        <button class="btn btn-success btn-sm" onclick="openAddUserRoleModal()">
                                            <i class="fas fa-plus"></i> Assign Role to New User
                                        </button>
                                    </div>
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Employee Name</th>
                                                    <th>Designation</th>
                                                    <th>Current Roles</th>
                                                    <th class="text-end">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="user : ${users}">
                                                    <td th:text="${user.employeeName}"></td>
                                                    <td th:text="${user.designation}"></td>
                                                    <td>
                                                        <span th:each="role : ${user.roles}"
                                                            class="badge bg-info text-dark me-1"
                                                            th:text="${role}"></span>
                                                    </td>
                                                    <td class="text-end">
                                                        <div class="btn-group">
                                                            <button class="btn btn-sm btn-outline-primary"
                                                                th:data-id="${user.employeeId}"
                                                                th:data-name="${user.employeeName}"
                                                                onclick="openAssignRoleModal(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                                                title="Edit Roles">
                                                                <i class="fas fa-edit"></i> Edit
                                                            </button>
                                                            <button class="btn btn-sm btn-outline-danger"
                                                                th:data-id="${user.employeeId}"
                                                                onclick="clearUserRoles(this.getAttribute('data-id'))"
                                                                title="Clear All Roles">
                                                                <i class="fas fa-trash-alt"></i> Delete
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                                <tr th:if="${#lists.isEmpty(users)}">
                                                    <td colspan="4" class="text-center text-muted py-4">No manageable
                                                        users found.</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <!-- System Roles Tab -->
                                <div class="tab-pane fade" id="system-roles" role="tabpanel"
                                    aria-labelledby="system-roles-tab">
                                    <div class="d-flex justify-content-end mb-3 mt-3">
                                        <button class="btn btn-success btn-sm" onclick="openAddRoleModal()">
                                            <i class="fas fa-plus"></i> Add New Role
                                        </button>
                                    </div>
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Role ID</th>
                                                    <th>Description</th>
                                                    <th>Priority</th>
                                                    <th class="text-end">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody id="allRolesTableBody">
                                                <!-- Populated via JS -->
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <div th:replace="fragments/footer :: footerPart"></div>
        </div>
    </div>

    <!-- Assign Role Modal -->
    <div class="modal fade" id="assignRoleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Assign Roles - <span id="modalTitleEmployeeName"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="modalEmployeeId">
                    <div class="mb-3" id="employeeSelectContainer">
                        <label class="form-label">Select Employee</label>
                        <select class="form-select" id="employeeSelect" onchange="onEmployeeSelected()">
                            <option value="">-- Select Employee --</option>
                            <!-- Employees will be loaded here -->
                        </select>
                    </div>
                    <div class="mb-3" id="selectedEmployeeNameDisplay" style="display:none;">
                        <label class="form-label d-block text-muted small">Employee</label>
                        <h6 id="modalDetailEmployeeName" class="fw-bold"></h6>
                    </div>
                    <label class="form-label d-block fw-bold mb-2">Select Role</label>
                    <div id="rolesCheckboxesContainer" class="border rounded p-3 bg-light"
                        style="max-height: 250px; overflow-y: auto;">
                        <!-- Roles will be loaded here as Radio buttons -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveRoleAssignment()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- System Role Modal (Add/Edit) -->
    <div class="modal fade" id="systemRoleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="systemRoleModalLabel">Add Role</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="systemRoleForm">
                        <input type="hidden" id="rolePrimaryKeyId">
                        <div class="row">
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label class="form-label">Role ID</label>
                                    <input type="text" class="form-control" id="roleIdInput" required
                                        placeholder="e.g. HR_MANAGER">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Priority</label>
                                    <input type="number" class="form-control" id="rolePriorityInput" required min="1"
                                        placeholder="1, 2, 3..">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="roleDescriptionInput" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveSystemRole()">Save Role</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/commonUI :: loader"></div>
    <div th:replace="fragments/commonUI :: toaster"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/jquery-min-3.7.1.js}"></script>
    <script th:src="@{/js/rolesPermissions.js}"></script>
</body>

</html>
