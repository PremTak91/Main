<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Home Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="dashboard-wrapper">

        <div th:replace="fragments/sidebar :: sidebarMenu"> </div>

        <div class="d-flex flex-column w-100">

            <div th:replace="fragments/header :: headerPart"> </div>

            <main class="main-content-area flex-grow-1">
                <h3 class="mb-4">Notification</h3>

                <div class="row" id="postContainer">
                    <div th:each="post : ${posts}" class="col-12 mb-4">
                        <div class="card p-4">
                            <div class="d-flex align-items-center mb-3">
                                <div th:if="${post.authorPhoto != null}" class="me-3">
                                    <img th:src="@{/images/employeePhoto/{photo}(photo=${post.authorPhoto})}"
                                        alt="User Avatar" class="rounded-circle border border-secondary"
                                        style="width: 60px; height: 60px; object-fit: cover;">
                                </div>
                                <div th:unless="${post.authorPhoto != null}" class="avatar-circle me-3"
                                    th:classappend="' letter-' + ${#strings.toUpperCase(#strings.substring(post.authorName, 0, 1))}">
                                    <span class="avatar-letter"
                                        th:text="${#strings.toUpperCase(#strings.substring(post.authorName, 0, 1))}"></span>
                                </div>
                                <div>
                                    <h5 class="mb-0" th:text="${post.authorName}">Author Name</h5>
                                    <small class="text-muted" th:text="${post.auditTimeStamp}">Timestamp</small>
                                </div>
                                <div th:if="${post.empId == currentUserId}" class="ms-auto">
                                    <button class="btn btn-sm btn-outline-secondary border-0"
                                        th:onclick="'editPost(' + ${post.id} + ')'" title="Edit Post">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="text-dark" th:text="${post.postText}">Post Text</p>
                            <div th:if="${post.postImage != null}" class="mb-3">
                                <img th:src="@{/images/postImages/{img}(img=${post.postImage})}" alt="Post Image"
                                    class="img-fluid rounded border shadow-sm"
                                    style="max-height: 500px; width: 100%; object-fit: contain;">
                            </div>
                            <div
                                class="d-flex justify-content-start align-items-center mt-3 text-muted border-top pt-3">
                                <a href="#" class="me-3 text-decoration-none text-muted"><i
                                        class="far fa-thumbs-up me-1"></i> Like</a>
                                <a href="#" class="text-decoration-none text-muted"><i class="far fa-comment me-1"></i>
                                    Comment</a>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(posts)}" class="col-12 text-center py-5">
                        <div class="text-muted">
                            <i class="fas fa-newspaper fa-3x mb-3"></i>
                            <p>No posts yet. Be the first to post something!</p>
                        </div>
                    </div>
                </div>
            </main>

            <div th:replace="fragments/footer :: footerPart"> </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
