<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Home Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="dashboard-wrapper">

        <div th:replace="fragments/sidebar :: sidebarMenu"> </div>

        <div class="d-flex flex-column w-100">

            <div th:replace="fragments/header :: headerPart"> </div>

            <main class="main-content-area flex-grow-1">
                <h3 class="mb-4">Notification</h3>

                <div class="row" id="postContainer">
                    <div th:each="post : ${posts}" class="col-12 mb-4">
                        <div class="card p-4">
                            <div class="d-flex align-items-center mb-3">
                                <div th:if="${post.authorPhoto != null and post.authorPhoto != '' and post.authorPhoto != 'null'}" class="me-3">
                                    <img th:src="${#strings.startsWith(post.authorPhoto, 'http') ? post.authorPhoto : '/NRS/images/employeePhoto/' + post.authorPhoto}"
                                        alt="User Avatar" class="rounded-circle border border-secondary"
                                        style="width: 60px; height: 60px; object-fit: cover;"
                                        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                    <div class="avatar-circle"
                                        th:classappend="' letter-' + ${post.authorName != null and post.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(post.authorName, 0, 1)) : 'U'}"
                                        style="display: none;">
                                        <span class="avatar-letter"
                                            th:text="${post.authorName != null and post.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(post.authorName, 0, 1)) : 'U'}"></span>
                                    </div>
                                </div>
                                <div th:unless="${post.authorPhoto != null and post.authorPhoto != '' and post.authorPhoto != 'null'}" class="avatar-circle me-3"
                                    th:classappend="' letter-' + ${post.authorName != null and post.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(post.authorName, 0, 1)) : 'U'}">
                                    <span class="avatar-letter"
                                        th:text="${post.authorName != null and post.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(post.authorName, 0, 1)) : 'U'}"></span>
                                </div>
                                <div>
                                    <h5 class="mb-0" th:text="${post.authorName}">Author Name</h5>
                                    <small class="text-muted" th:text="${post.auditTimeStamp}">Timestamp</small>
                                </div>
                                <div th:if="${post.empId == currentUserId} or ${#authorization.expression('hasRole(''SUPERADMIN'')')}" class="ms-auto dropdown">
                                    <button class="btn btn-sm btn-outline-secondary border-0" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Options">
                                        <i class="fas fa-ellipsis-v"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end shadow">
                                        <li>
                                            <a class="dropdown-item" href="javascript:void(0)" th:onclick="'editPost(' + ${post.id} + ')'">
                                                <i class="fas fa-edit text-info me-2"></i> Edit
                                            </a>
                                        </li>
                                        <li>
                                            <a class="dropdown-item text-danger" href="javascript:void(0)" th:onclick="'deletePost(' + ${post.id} + ')'">
                                                <i class="fas fa-trash-alt me-2"></i> Delete
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <p class="text-dark" th:text="${post.postText}">Post Text</p>
                            <div th:if="${post.postImage != null and post.postImage != '' and post.postImage != 'null'}" class="mb-3">
                                <img th:src="@{/images/postImages/{img}(img=${post.postImage})}" alt="Post Image"
                                    class="img-fluid rounded border shadow-sm"
                                    style="max-height: 500px; width: 100%; object-fit: contain;"
                                    onerror="this.parentElement.style.display='none';">
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3 text-muted border-top pt-3">
                                <div>
                                    <button class="btn btn-link text-decoration-none shadow-none p-0 me-3" 
                                            th:classappend="${post.likedByMe} ? 'text-primary' : 'text-muted'"
                                            th:onclick="'toggleLike(' + ${post.id} + ', this)'">
                                        <i class="fa-thumbs-up me-1" th:classappend="${post.likedByMe} ? 'fas' : 'far'"></i> 
                                        Like <span class="like-count-wrapper" th:style="${post.likeCount > 0 ? '' : 'display: none;'}">(<span class="like-count" th:text="${post.likeCount}">0</span>)</span>
                                    </button>
                                    <button class="btn btn-link text-decoration-none shadow-none p-0 text-muted" 
                                            th:onclick="'toggleCommentSection(' + ${post.id} + ')'">
                                        <i class="far fa-comment me-1"></i> 
                                        Comment <span class="comment-count-wrapper" th:style="${post.commentCount > 0 ? '' : 'display: none;'}">(<span th:id="'comment-count-' + ${post.id}" class="comment-count" th:text="${post.commentCount}">0</span>)</span>
                                    </button>
                                </div>
                                <div th:if="${post.likeCount > 0}">
                                    <a href="javascript:void(0)" class="text-muted small text-decoration-none" 
                                       th:data-post-id="${post.id}"
                                       th:data-likers="${#strings.listJoin(post.likerNames, ',')}"
                                       onclick="showLikes(this.getAttribute('data-post-id'), this.getAttribute('data-likers'))">
                                       <i class="fas fa-heart text-danger me-1"></i> <span th:text="${post.likeCount}"></span>
                                    </a>
                                </div>
                            </div>
                            
                            <!-- Comment Section (Hidden by default) -->
                            <div th:id="'comment-section-' + ${post.id}" class="mt-3 border-top pt-3" style="display: none;">
                                <div class="d-flex mb-3">
                                    <div class="me-2">
                                        <img th:if="${currentUserPhoto != null and currentUserPhoto != '' and currentUserPhoto != 'null'}" 
                                             th:src="${#strings.startsWith(currentUserPhoto, 'http') ? currentUserPhoto : '/NRS/images/employeePhoto/' + currentUserPhoto}" 
                                             alt="Profile" class="rounded-circle" style="width: 32px; height: 32px; object-fit: cover;"
                                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                        <div class="avatar-circle" th:classappend="' letter-' + ${currentUserName != null and currentUserName.length() > 0 ? #strings.toUpperCase(#strings.substring(currentUserName, 0, 1)) : 'U'}"
                                             style="width: 32px; height: 32px; font-size: 14px; line-height: 32px;"
                                             th:style="${currentUserPhoto != null and currentUserPhoto != '' and currentUserPhoto != 'null' ? 'display: none;' : ''}">
                                            <span class="avatar-letter" th:text="${currentUserName != null and currentUserName.length() > 0 ? #strings.toUpperCase(#strings.substring(currentUserName, 0, 1)) : 'U'}"></span>
                                        </div>
                                    </div>
                                    <div class="flex-grow-1 position-relative">
                                        <input type="text" th:id="'comment-input-' + ${post.id}" class="form-control form-control-sm rounded-pill pe-5" placeholder="Write a comment...">
                                        <button th:id="'comment-btn-' + ${post.id}" class="btn btn-sm btn-link position-absolute top-50 end-0 translate-middle-y text-primary text-decoration-none" 
                                                th:onclick="'submitComment(' + ${post.id} + ')'"><i class="fas fa-paper-plane"></i></button>
                                    </div>
                                </div>
                                
                                <div th:id="'comments-list-' + ${post.id}">
                                    <div th:each="comment : ${post.comments}" class="d-flex mb-3">
                                        <div th:if="${comment.authorPhoto != null and comment.authorPhoto != '' and comment.authorPhoto != 'null'}" class="me-2">
                                            <img th:src="${#strings.startsWith(comment.authorPhoto, 'http') ? comment.authorPhoto : '/NRS/images/employeePhoto/' + comment.authorPhoto}"
                                                 alt="Avatar" class="rounded-circle" style="width: 32px; height: 32px; object-fit: cover;"
                                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                            <div class="avatar-circle" th:classappend="' letter-' + ${comment.authorName != null and comment.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(comment.authorName, 0, 1)) : 'U'}"
                                                 style="display: none; width: 32px; height: 32px; font-size: 14px; line-height: 32px;">
                                                <span class="avatar-letter" th:text="${comment.authorName != null and comment.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(comment.authorName, 0, 1)) : 'U'}"></span>
                                            </div>
                                        </div>
                                        <div th:unless="${comment.authorPhoto != null and comment.authorPhoto != '' and comment.authorPhoto != 'null'}" class="avatar-circle me-2"
                                             th:classappend="' letter-' + ${comment.authorName != null and comment.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(comment.authorName, 0, 1)) : 'U'}"
                                             style="width: 32px; height: 32px; font-size: 14px; line-height: 32px;">
                                            <span class="avatar-letter" th:text="${comment.authorName != null and comment.authorName.length() > 0 ? #strings.toUpperCase(#strings.substring(comment.authorName, 0, 1)) : 'U'}"></span>
                                        </div>
                                        <div class="bg-light rounded p-2 flex-grow-1">
                                            <div class="d-flex justify-content-between">
                                                <strong th:text="${comment.authorName}">Name</strong>
                                                <small class="text-muted" th:text="${comment.createdAt}">Time</small>
                                            </div>
                                            <p class="mb-0 small" th:text="${comment.text}">Comment text</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(posts)}" class="col-12 text-center py-5">
                        <div class="text-muted">
                            <i class="fas fa-newspaper fa-3x mb-3"></i>
                            <p>No posts yet. Be the first to post something!</p>
                        </div>
                    </div>
                </div>
            </main>

            <div th:replace="fragments/footer :: footerPart"> </div>

        </div>
    </div>

    <div th:replace="fragments/commonUI :: loader"></div>
    <div th:replace="fragments/commonUI :: toaster"></div>
    <div th:replace="fragments/commonUI :: confirmModal"></div>
    
    <!-- Likes Modal -->
    <div class="modal fade" id="likesModal" tabindex="-1" aria-labelledby="likesModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="likesModalLabel"><i class="fas fa-thumbs-up text-primary me-2"></i> People who liked this</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0" id="likesModalBody">
                    <!-- Populated via JS -->
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
    <script th:src="@{/js/postInteractions.js}"></script>
</body>

</html>
