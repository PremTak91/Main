<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Leave Role</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div class="dashboard-wrapper">

        <div th:replace="fragments/sidebar :: sidebarMenu"> </div>

        <div class="d-flex flex-column w-100">

            <div th:replace="fragments/header :: headerPart"> </div>

            <main class="main-content-area flex-grow-1">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="mb-0">Leave Role Management</h3>
                </div>

                <div class="card p-4 mb-4">
                    <form id="leaveRoleForm">
                        <input type="hidden" id="leaveRoleId" value="">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-6 col-lg-3">
                                <label for="employeeSelect" class="form-label">Employee</label>
                                <select class="form-select" id="employeeSelect" required>
                                    <option selected disabled value="">Select Employee</option>
                                    <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}">
                                        Employee Name</option>
                                </select>
                            </div>
                            <div class="col-md-6 col-lg-3">
                                <label for="leaveApproverSelect" class="form-label">Leave Approver</label>
                                <select class="form-select" id="leaveApproverSelect" required>
                                    <option selected disabled value="">Select Approver</option>
                                    <option th:each="approver : ${approvers}" th:value="${approver.id}"
                                        th:text="${approver.name}">Approver Name</option>
                                </select>
                            </div>
                            <div class="col-md-6 col-lg-2">
                                <label for="statusSelect" class="form-label">Status</label>
                                <select class="form-select" id="statusSelect" required>
                                    <option selected disabled value="">Select Status</option>
                                    <option value="1">Active</option>
                                    <option value="2">Inactive</option>
                                </select>
                            </div>
                            <div class="col-md-6 col-lg-2 d-flex align-items-end gap-2">
                                <button type="button" class="btn btn-primary" id="saveBtn"
                                    onclick="saveLeaveRole()">Save</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="card p-4">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                        <h5 class="card-title mb-2 mb-md-0">Employee Leave Roles</h5>
                        <div class="d-flex align-items-center flex-wrap">
                            <label for="showEntries" class="form-label me-2 mb-0">Show</label>
                            <select class="form-select form-select-sm" id="showEntries" style="width: auto;">
                                <option value="10">10</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                            <span class="ms-2 me-3">entries</span>
                            <label for="searchTable" class="form-label me-2 mb-0">Search:</label>
                            <input type="text" class="form-control form-control-sm d-inline-block" id="searchTable"
                                placeholder="" style="width: auto;">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle" id="leaveRoleTable">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">No.</th>
                                    <th scope="col">Employee Name</th>
                                    <th scope="col">Leave Approver</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="role, iterStat : ${leaveRoles}">
                                    <td th:text="${iterStat.index + 1}">1</td>
                                    <td th:text="${role.employeeName}">Employee Name</td>
                                    <td th:text="${role.approverName}">Approver Name</td>
                                    <td>
                                        <span th:if="${role.active == 1}" class="badge bg-success">Active</span>
                                        <span th:if="${role.active != 1}" class="badge bg-secondary">Inactive</span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-info text-white me-1" title="Edit"
                                            th:onclick="'editLeaveRole(' + ${role.id} + ', ' + ${role.employeeId} + ', ' + ${role.approverId} + ', ' + ${role.active} + ')'">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button th:if="${role.active == 1}" class="btn btn-sm btn-danger" title="Delete"
                                            th:onclick="'deleteLeaveRole(' + ${role.id} + ')'">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(leaveRoles)}">
                                    <td colspan="5" class="text-center">No leave roles found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <div th:replace="fragments/footer :: footerPart"> </div>

        </div>
    </div>

    <div th:replace="fragments/commonUI :: loader"></div>
    <div th:replace="fragments/commonUI :: toaster"></div>

    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
    <script th:src="@{/js/leaveRole.js}"></script>
</body>

</html>
