<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS Solar Solution - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container-fluid main-content">
    <div class="row w-100 justify-content-center align-items-center min-vh-100">

        <!-- Left branding section -->
        <div class="col-12 col-md-6 col-lg-6 left-section d-flex flex-column align-items-center justify-content-center text-center"
             style="background-color: #161970; color: white; padding: 2rem;">
            <!-- Replace this SVG with your updated logo SVG -->

            <img th:src="@{/images/NRS_brand.png}" height="100" width="150"/>
            <div class="nrs-logo-text h3 mb-0 fw-bold">NRS</div>
            <div class="nrs-logo-subtext mb-4">SOLAR SOLUTION</div>
            <p class="lead fst-italic" style="max-width: 300px;">
                "SUCCESS IS A GAME AND WE HAVE TO PLAY THE ROLE"
            </p>
        </div>

        <!-- Right registration form -->
        <div class="col-12 col-md-6 col-lg-6 d-flex justify-content-center">
            <div class="card shadow rounded-4 w-100">
                <div class="card-header bg-white text-center border-0 pt-4">
                    <h2 class="fw-bold text-primary">
                        <i class="fa-solid fa-user-plus"></i> Register New Talent
                    </h2>
                </div>

                <div class="card-body px-4 pt-0 pb-4">
                    <form id="employeeForm" enctype="multipart/form-data" novalidate>

                        <!-- Name -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" name="firstName" id="firstName" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Middle Name</label>
                                <input type="text" class="form-control" name="middleName" id="middleName">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" name="lastName" id="lastName" required>
                            </div>
                        </div>

                        <!-- Contact -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" id="email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone No</label>
                                <input type="text" class="form-control" name="phoneNumber" id="phoneNumber" required>
                            </div>
                        </div>



                        <!-- Role & Designation -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Role</label>
                                <select class="form-select" name="roleId" id="roleId" required>
                                    <option value="">Select Role</option>
                                    <option th:each="role : ${rolesList}"
                                            th:value="${role.id}"
                                            th:text="${role.roleId}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Designation</label>
                                <select class="form-select" name="designationId" id="designationId" required>
                                    <option value="">Select Designation</option>
                                    <option th:each="designation : ${designationList}"
                                            th:value="${designation.id}"
                                            th:text="${designation.designation}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- DOJ & Password -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Date of Joining</label>
                                <input type="date" class="form-control" name="dateOfJoining" id="dateOfJoining" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="text" class="form-control" name="password" id="password">
                            </div>
                        </div>


                        <!-- Submit -->
                        <div class="text-center mt-3">
                            <button type="submit" class="btn btn btn-primary btn-lg px-5">
                                <i class="fa-solid fa-floppy-disk"></i> Register
                            </button>
                        </div>

                    </form>

                    <div id="responseMsg" class="mt-3 text-center"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footerPart}"></div>
</body>
<div th:replace="~{fragments/commonJquery :: commonJquery}"></div>
<script th:src="@{/js/registration.js}"></script>
</html>
