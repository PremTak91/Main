<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Work Updates | NRS Solar Solution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebarMenu}"></div>

        <div class="d-flex flex-column w-100">
            <div th:replace="~{fragments/header :: headerPart}"></div>

            <main class="main-content-area flex-grow-1 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                    <h3 class="mb-0 text-primary fw-bold"><i class="fas fa-clipboard-list me-2"></i>Daily Work Updates</h3>
                    <button class="btn btn-primary" onclick="openAddWorkLogModal()">
                        <i class="fas fa-plus"></i> Add Work Log
                    </button>
                </div>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Search/Filter Form -->
                <div class="card mb-4 shadow-sm border-0">
                    <div class="card-body bg-light rounded">
                        <form th:action="@{/worklogs}" method="get" class="row g-3">
                            <div class="col-md-4" sec:authorize="hasAnyRole('SUPERADMIN', 'ADMIN')">
                                <label class="form-label text-muted small fw-bold">Search Employee</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" name="keyword" class="form-control border-start-0 ps-0" placeholder="Employee Name" th:value="${keyword}">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold">Start Date</label>
                                <input type="date" name="startDate" class="form-control" th:value="${startDate}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold">End Date</label>
                                <input type="date" name="endDate" class="form-control" th:value="${endDate}">
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-filter me-1"></i> Filter
                                </button>
                                <a th:href="@{/worklogs}" class="btn btn-outline-secondary w-100 ms-2" title="Reset Filters">
                                    <i class="fas fa-sync-alt"></i>
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Work Logs Table -->
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 15%">
                                            <a th:href="@{/worklogs(sortBy='workDate', sortDir=${reverseSortDir}, keyword=${keyword}, startDate=${startDate}, endDate=${endDate})}" class="text-dark text-decoration-none">
                                                Work Date <i class="fas fa-sort ms-1"></i>
                                            </a>
                                        </th>
                                        <th sec:authorize="hasAnyRole('SUPERADMIN', 'ADMIN')" style="width: 20%">Employee Name</th>
                                        <th style="width: 40%">Work Description</th>
                                        <th style="width: 15%">Logged At</th>
                                        <th style="width: 10%" class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="log : ${logs.content}">
                                        <td>
                                            <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${#temporals.format(log.workDate, 'dd MMM yyyy')}"></span>
                                        </td>
                                        <td sec:authorize="hasAnyRole('SUPERADMIN', 'ADMIN')">
                                            <div class="d-flex align-items-center">
                                                <div class="bg-light rounded-circle p-2 me-2 d-flex justify-content-center align-items-center" style="width: 32px; height: 32px;">
                                                    <i class="fas fa-user text-secondary"></i>
                                                </div>
                                                <span class="fw-medium" th:text="${log.employee?.getFullName() ?: 'Unknown'}"></span>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="text-wrap" style="max-width: 400px; white-space: pre-line;" th:text="${log.workDescription}"></div>
                                        </td>
                                        <td class="text-muted small" th:text="${log.createdAt != null ? #temporals.format(log.createdAt, 'dd MMM yyyy, HH:mm') : '-'}"></td>
                                        <td class="text-end">
                                            <button th:onclick="'editWorkLog(' + ${log.id} + ')'" class="btn btn-sm btn-outline-primary" title="Edit Log">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                        </td>
                                    </tr>
                                    <tr th:if="${logs.empty}">
                                        <td colspan="5" class="text-center py-5 text-muted">
                                            <i class="fas fa-clipboard text-light fa-3x mb-3"></i>
                                            <p class="mb-0 fs-5">No work logs found.</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="d-flex justify-content-between align-items-center mt-4 px-2" th:if="${totalPages > 0}">
                    <div class="text-muted small">
                        Showing <span th:text="${currentPage * 10 + 1}"></span> to 
                        <span th:text="${((currentPage + 1) * 10 < totalItems) ? (currentPage + 1) * 10 : totalItems}"></span> of 
                        <span th:text="${totalItems}"></span> entries
                    </div>
                    <nav aria-label="Page navigation">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/worklogs(page=${currentPage - 1}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${keyword}, startDate=${startDate}, endDate=${endDate})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i ? 'active' : ''}">
                                <a class="page-link" th:href="@{/worklogs(page=${i}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${keyword}, startDate=${startDate}, endDate=${endDate})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/worklogs(page=${currentPage + 1}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${keyword}, startDate=${startDate}, endDate=${endDate})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Work Log Modal -->
    <div class="modal fade" id="workLogModal" tabindex="-1" aria-labelledby="workLogModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="workLogModalLabel"><i class="fas fa-edit me-2"></i>Add Work Log</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="workLogForm">
                    <input type="hidden" id="workLogId" name="id">
                    <div class="modal-body p-4">
                        <div class="mb-4">
                            <label for="workDate" class="form-label fw-bold text-secondary">Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control form-control-lg" id="workDate" name="workDate" required>
                        </div>
                        <div class="mb-3">
                            <label for="workDescription" class="form-label fw-bold text-secondary">Work Description <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="workDescription" name="workDescription" rows="5" required placeholder="Describe the tasks you completed today..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary px-4 fw-bold">Save Log</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Shared UI Components -->
    <div th:replace="~{fragments/commonUI :: loader}"></div>
    <div th:replace="~{fragments/commonUI :: toaster}"></div>
    <div th:replace="~{fragments/commonUI :: confirmModal}"></div>
    <div th:replace="~{fragments/commonJquery :: commonJquery}"></div>

    <script th:src="@{/js/workLogManagement.js}"></script>
</body>
</html>
