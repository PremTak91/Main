<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

    <!-- Common Loader -->
    <div th:fragment="loader" id="pageLoader"
        class="d-none position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center"
        style="background: rgba(255, 255, 255, 0.8); z-index: 9999;">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Common Toaster -->
    <div th:fragment="toaster" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 10000;">
        <div id="commonToast" class="toast align-items-center border-0" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center">
                    <i id="toastIcon" class="fas fa-check-circle me-2 fs-5"></i>
                    <span id="toastMessage">Action successful</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Common Confirmation Modal -->
    <div th:fragment="confirmModal" class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true" style="z-index: 10001;">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-body text-center p-4">
                    <i class="fas fa-exclamation-triangle text-warning fs-1 mb-3"></i>
                    <h5 class="modal-title mb-2 fw-bold" id="confirmTitle">Confirm Action</h5>
                    <p class="text-muted mb-4" id="confirmMessage">Are you sure you want to proceed?</p>
                    <div class="d-flex justify-content-center gap-2">
                        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger px-4" id="confirmBtn">Confirm</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
