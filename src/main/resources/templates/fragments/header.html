<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

    <nav th:fragment="headerPart" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container-fluid">
            <button class="btn btn-primary d-lg-none me-3" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <a class="navbar-brand d-lg-none" href="#">
                <span class="text-primary fw-bold">NRS Home</span>
            </a>

            <div class="ms-auto d-flex align-items-center">
                <button id="attendanceBtn" class="badge bg-danger rounded-pill me-3 d-none d-sm-block border-0"
                    onclick="toggleAttendance()">IN</button>
                <div class="dropdown">
                    <a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#" id="userDropdown"
                        role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="avatar-circle"
                            th:classappend="' letter-' + ${#strings.toUpperCase(#strings.substring(currentUserName, 0, 1))}">
                            <span class="avatar-letter"
                                th:text="${#strings.toUpperCase(#strings.substring(currentUserName, 0, 1))}"></span>
                        </div>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li>
                            <h6 class="dropdown-header" th:text="${currentUserName != null ? currentUserName : ''}">
                            </h6>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" th:href="@{/profile}"><i
                                    class="fas fa-user-circle me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/logout}"><i
                                    class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <script th:src="@{/js/attendance.js}"></script>
    </nav>

</body>

</html>
