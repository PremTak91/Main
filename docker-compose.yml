version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: nrs-docker.dockerfile
    container_name: nrs_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always